version: 1
applications:
  - backend:
      phases:
        build:
          commands:
            - npm install
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
    test:
      phases:
        preTest:
          commands:
            # Install k6 and jq to $HOME/bin — /usr/local/bin is not writable in Amplify test runner
            - mkdir -p $HOME/bin
            - curl -sL https://github.com/grafana/k6/releases/download/v0.45.1/k6-v0.45.1-linux-amd64.tar.gz
                | tar -xz --strip-components=1 -C $HOME/bin k6-v0.45.1-linux-amd64/k6
            - curl -sL https://github.com/stedolan/jq/releases/download/jq-1.6/jq-linux64 -o $HOME/bin/jq
            - chmod +x $HOME/bin/jq
            - $HOME/bin/k6 version
            - $HOME/bin/jq --version
            # Create reports directory early so Amplify artifact collection never fails
            - mkdir -p reports
            # Debug — confirm working directory and amplify_outputs.json location
            - pwd
            - find . -name "amplify_outputs.json" 2>/dev/null
            - cat amplify_outputs.json 2>/dev/null || cat ../amplify_outputs.json 2>/dev/null || echo "amplify_outputs.json not found"
            # ---------------------------------------------------------------------------
            # Playwright setup
            # ---------------------------------------------------------------------------
            # Install Playwright's Chromium browser binary (the npm package was already
            # installed during the frontend preBuild via npm install).
            - npx playwright install chromium --with-deps
            # Serve the pre-built frontend on port 3000 in the background.
            # The dist/ directory was produced by the frontend build phase.
            - npx serve -s dist -l 3000 &
            # Wait until the server is accepting connections before running tests.
            - npx wait-on http://localhost:3000 --timeout 60000
        test:
          commands:
            # COGNITO_TEST_USER and COGNITO_TEST_PASSWORD must be set as
            # Amplify environment variables (App settings → Environment
            # variables in the Amplify console) — NOT in Hosting → Secret
            # management. Secrets are only injected during the backend build
            # phase and are not available in the test phase. The smoke tests
            # are skipped gracefully if either variable is not configured.
            - |
              OUTPUTS_FILE="amplify_outputs.json"
              if [ ! -f "$OUTPUTS_FILE" ]; then
                OUTPUTS_FILE="../amplify_outputs.json"
              fi

              export APPSYNC_ENDPOINT=$($HOME/bin/jq -r '.data.url' "$OUTPUTS_FILE")
              export APIGW_BASE_URL=$($HOME/bin/jq -r '.custom.tasksApiUrl' "$OUTPUTS_FILE" | sed 's|/$||')
              export COGNITO_CLIENT_ID=$($HOME/bin/jq -r '.auth.user_pool_client_id' "$OUTPUTS_FILE")
              export AWS_REGION=$($HOME/bin/jq -r '.auth.aws_region' "$OUTPUTS_FILE")

              echo "COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}"
              echo "APPSYNC_ENDPOINT=${APPSYNC_ENDPOINT}"
              echo "APIGW_BASE_URL=${APIGW_BASE_URL}"

              if [ -z "${COGNITO_TEST_USER}" ] || [ -z "${COGNITO_TEST_PASSWORD}" ]; then
                echo "Smoke tests skipped — COGNITO_TEST_USER or COGNITO_TEST_PASSWORD not configured in Amplify Secret management"
                echo '{"skipped": true, "reason": "credentials not configured"}' > reports/skipped.json
                exit 0
              fi

              $HOME/bin/k6 run \
                --env PROFILE=smoke \
                --env APPSYNC_ENDPOINT="${APPSYNC_ENDPOINT}" \
                --env COGNITO_CLIENT_ID="${COGNITO_CLIENT_ID}" \
                --env COGNITO_TEST_USER="${COGNITO_TEST_USER}" \
                --env COGNITO_TEST_PASSWORD="${COGNITO_TEST_PASSWORD}" \
                --env AWS_REGION="${AWS_REGION}" \
                --summary-export=reports/graphql-smoke.json \
                tests/load/graphql.test.js &
              GRAPHQL_PID=$!

              $HOME/bin/k6 run \
                --env PROFILE=smoke \
                --env APIGW_BASE_URL="${APIGW_BASE_URL}" \
                --env COGNITO_CLIENT_ID="${COGNITO_CLIENT_ID}" \
                --env COGNITO_TEST_USER="${COGNITO_TEST_USER}" \
                --env COGNITO_TEST_PASSWORD="${COGNITO_TEST_PASSWORD}" \
                --env AWS_REGION="${AWS_REGION}" \
                --summary-export=reports/rest-smoke.json \
                tests/load/rest.test.js &
              REST_PID=$!

              GRAPHQL_EXIT=0; REST_EXIT=0
              wait $GRAPHQL_PID || GRAPHQL_EXIT=$?
              wait $REST_PID || REST_EXIT=$?

              if [ $GRAPHQL_EXIT -ne 0 ] || [ $REST_EXIT -ne 0 ]; then
                echo "Smoke tests failed — graphql exit=${GRAPHQL_EXIT}, rest exit=${REST_EXIT}"
                exit 1
              fi
            # ---------------------------------------------------------------------------
            # Playwright E2E tests
            # ---------------------------------------------------------------------------
            - npx playwright test
        postTest:
          commands:
            # Kill the static file server that was started in preTest.
            - pkill -f "serve -s dist" || true
      artifacts:
        baseDirectory: .
        files:
          - 'reports/**/*'
          - 'playwright-report/**/*'
    appRoot: amplify-todo-app