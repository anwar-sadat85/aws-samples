name: Load Tests — UAT

# ─── Trigger ─────────────────────────────────────────────────────────────────
# Fired automatically by the Amplify deployment pipeline via the
# load-test-dispatcher Lambda, which maps the Amplify appId to this
# app-specific event type: amplify-uat-deployed-todo
#
# Path filter ensures this workflow only runs when files inside
# amplify-todo-app/ change on push — other app folders are ignored.
#
# Or manually via GitHub Actions UI / CLI with a profile selection.
# Manual runs default to smoke — select load, stress, or soak for deeper testing.
on:
  push:
    paths:
      - 'amplify-todo-app/**'
  repository_dispatch:
    types: [amplify-uat-deployed-todo]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Load profile to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - stress
          - soak

# Only one load test run at a time — a second deploy during an in-progress run
# queues rather than cancels (cancel-in-progress: false) so results are never
# silently dropped.
concurrency:
  group: load-tests-uat-todo
  cancel-in-progress: false

# ─── Permissions ─────────────────────────────────────────────────────────────
# id-token: write is required for AWS OIDC token exchange.
permissions:
  id-token: write
  contents: read

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # Job 1: Smoke Tests
  # Runs the GraphQL and REST smoke profiles in parallel within the same job.
  # Both tests must pass before load tests are allowed to proceed.
  # ════════════════════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install k6 from the official Grafana apt repository.
      # https://grafana.com/docs/k6/latest/set-up/install-k6/
      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q
          sudo apt-get install -y k6

      - name: Create reports directory
        run: mkdir -p reports

      # Run GraphQL and REST smoke tests in parallel using background processes.
      # Both PIDs are captured; the step fails if either test exits non-zero.
      # Profile is always smoke in this job — workflow_dispatch profile selection
      # only affects the load-test job.
      - name: Run smoke tests (GraphQL + REST in parallel)
        env:
          COGNITO_CLIENT_ID:     ${{ secrets.COGNITO_CLIENT_ID }}
          COGNITO_TEST_USER:     ${{ secrets.COGNITO_TEST_USER }}
          COGNITO_TEST_PASSWORD: ${{ secrets.COGNITO_TEST_PASSWORD }}
          APPSYNC_ENDPOINT:      ${{ secrets.APPSYNC_ENDPOINT }}
          APIGW_BASE_URL:        ${{ secrets.APIGW_BASE_URL }}
          TEST_TODO_ID:          ${{ secrets.TEST_TODO_ID }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail

          k6 run \
            --env PROFILE=smoke \
            --env COGNITO_CLIENT_ID="${COGNITO_CLIENT_ID}" \
            --env COGNITO_TEST_USER="${COGNITO_TEST_USER}" \
            --env COGNITO_TEST_PASSWORD="${COGNITO_TEST_PASSWORD}" \
            --env APPSYNC_ENDPOINT="${APPSYNC_ENDPOINT}" \
            --env TEST_TODO_ID="${TEST_TODO_ID}" \
            --env AWS_REGION="${AWS_REGION}" \
            --summary-export=reports/graphql-smoke.json \
            amplify-todo-app/tests/load/graphql.test.js &
          GQL_PID=$!

          k6 run \
            --env PROFILE=smoke \
            --env COGNITO_CLIENT_ID="${COGNITO_CLIENT_ID}" \
            --env COGNITO_TEST_USER="${COGNITO_TEST_USER}" \
            --env COGNITO_TEST_PASSWORD="${COGNITO_TEST_PASSWORD}" \
            --env APIGW_BASE_URL="${APIGW_BASE_URL}" \
            --env AWS_REGION="${AWS_REGION}" \
            --summary-export=reports/rest-smoke.json \
            amplify-todo-app/tests/load/rest.test.js &
          REST_PID=$!

          GQL_EXIT=0
          REST_EXIT=0
          wait $GQL_PID  || GQL_EXIT=$?
          wait $REST_PID || REST_EXIT=$?

          if [ $GQL_EXIT -ne 0 ]; then
            echo "::error::GraphQL smoke test failed (exit $GQL_EXIT)"
          fi
          if [ $REST_EXIT -ne 0 ]; then
            echo "::error::REST smoke test failed (exit $REST_EXIT)"
          fi

          [ $GQL_EXIT -eq 0 ] && [ $REST_EXIT -eq 0 ]

      # Upload smoke reports so they're available even if load tests are skipped.
      - name: Upload smoke reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-reports-${{ github.run_id }}
          path: reports/
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # Job 2: Load Tests
  # Runs only when both smoke tests pass. Skipped when a manual run selects
  # the smoke profile — smoke-only runs exit after Job 1.
  # Runs GraphQL and REST profiles in parallel, then writes a job summary
  # and uploads results to S3.
  # ════════════════════════════════════════════════════════════════════════════
  load-test:
    name: Load Tests
    runs-on: ubuntu-22.04
    needs: smoke-test
    if: |
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_dispatch' && inputs.profile != 'smoke')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q
          sudo apt-get install -y k6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Create reports directory
        run: mkdir -p reports

      # Run GraphQL and REST load tests in parallel.
      # Profile is determined by the trigger:
      #   - repository_dispatch → always 'load'
      #   - workflow_dispatch   → user-selected profile (load, stress, or soak)
      # k6 exits non-zero when a threshold is breached — capture both exit codes
      # and report them individually before failing the step.
      - name: Run load tests (GraphQL + REST in parallel)
        env:
          COGNITO_CLIENT_ID:     ${{ secrets.COGNITO_CLIENT_ID }}
          COGNITO_TEST_USER:     ${{ secrets.COGNITO_TEST_USER }}
          COGNITO_TEST_PASSWORD: ${{ secrets.COGNITO_TEST_PASSWORD }}
          APPSYNC_ENDPOINT:      ${{ secrets.APPSYNC_ENDPOINT }}
          APIGW_BASE_URL:        ${{ secrets.APIGW_BASE_URL }}
          TEST_TODO_ID:          ${{ secrets.TEST_TODO_ID }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          LOAD_PROFILE:          ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'load' }}
        run: |
          set -euo pipefail

          k6 run \
            --env PROFILE="${LOAD_PROFILE}" \
            --env COGNITO_CLIENT_ID="${COGNITO_CLIENT_ID}" \
            --env COGNITO_TEST_USER="${COGNITO_TEST_USER}" \
            --env COGNITO_TEST_PASSWORD="${COGNITO_TEST_PASSWORD}" \
            --env APPSYNC_ENDPOINT="${APPSYNC_ENDPOINT}" \
            --env TEST_TODO_ID="${TEST_TODO_ID}" \
            --env AWS_REGION="${AWS_REGION}" \
            --summary-export=reports/graphql-load.json \
            amplify-todo-app/tests/load/graphql.test.js &
          GQL_PID=$!

          k6 run \
            --env PROFILE="${LOAD_PROFILE}" \
            --env COGNITO_CLIENT_ID="${COGNITO_CLIENT_ID}" \
            --env COGNITO_TEST_USER="${COGNITO_TEST_USER}" \
            --env COGNITO_TEST_PASSWORD="${COGNITO_TEST_PASSWORD}" \
            --env APIGW_BASE_URL="${APIGW_BASE_URL}" \
            --env AWS_REGION="${AWS_REGION}" \
            --summary-export=reports/rest-load.json \
            amplify-todo-app/tests/load/rest.test.js &
          REST_PID=$!

          GQL_EXIT=0
          REST_EXIT=0
          wait $GQL_PID  || GQL_EXIT=$?
          wait $REST_PID || REST_EXIT=$?

          if [ $GQL_EXIT -ne 0 ]; then
            echo "::error::GraphQL load test failed (exit $GQL_EXIT)"
          fi
          if [ $REST_EXIT -ne 0 ]; then
            echo "::error::REST load test failed (exit $REST_EXIT)"
          fi

          [ $GQL_EXIT -eq 0 ] && [ $REST_EXIT -eq 0 ]

      # ── Job Summary ─────────────────────────────────────────────────────────
      # Parse the --summary-export JSON files and write a markdown table to
      # $GITHUB_STEP_SUMMARY. Runs even if the load tests fail (if: always())
      # so that partial results are still visible.
      - name: Write job summary
        if: always()
        run: |
          set +e  # allow jq to fail gracefully if files are missing

          extract_metric() {
            local file="$1"
            local metric="$2"
            local field="$3"
            jq -r --arg m "$metric" --arg f "$field" \
              '.metrics[$m].values[$f] // "n/a"' "$file" 2>/dev/null || echo "n/a"
          }

          threshold_status() {
            local file="$1"
            local metric="$2"
            # Returns ✅ if all thresholds for this metric passed, ❌ otherwise
            local ok
            ok=$(jq -r --arg m "$metric" \
              '[.metrics[$m].thresholds // {} | to_entries[].value.ok] | all' \
              "$file" 2>/dev/null)
            if [ "$ok" = "true" ]; then
              echo "✅ Pass"
            elif [ "$ok" = "false" ]; then
              echo "❌ Fail"
            else
              echo "— n/a"
            fi
          }

          format_ms() {
            local val="$1"
            if [ "$val" = "n/a" ] || [ "$val" = "null" ]; then
              echo "n/a"
            else
              # Round to nearest integer and append ms
              printf "%.0f ms\n" "$val"
            fi
          }

          format_rate() {
            local val="$1"
            if [ "$val" = "n/a" ] || [ "$val" = "null" ]; then
              echo "n/a"
            else
              # Express as percentage with 2 decimal places
              awk "BEGIN { printf \"%.2f%%\n\", $val * 100 }"
            fi
          }

          GQL_FILE="reports/graphql-load.json"
          REST_FILE="reports/rest-load.json"

          GQL_P95=$(extract_metric "$GQL_FILE"  "http_req_duration" "p(95)")
          GQL_ERR=$(extract_metric "$GQL_FILE"  "http_req_failed"   "rate")
          GQL_REQ=$(extract_metric "$GQL_FILE"  "http_reqs"         "count")
          GQL_DUR_STATUS=$(threshold_status "$GQL_FILE"  "http_req_duration")
          GQL_ERR_STATUS=$(threshold_status "$GQL_FILE"  "http_req_failed")

          REST_P95=$(extract_metric "$REST_FILE" "http_req_duration" "p(95)")
          REST_ERR=$(extract_metric "$REST_FILE" "http_req_failed"   "rate")
          REST_REQ=$(extract_metric "$REST_FILE" "http_reqs"         "count")
          REST_DUR_STATUS=$(threshold_status "$REST_FILE" "http_req_duration")
          REST_ERR_STATUS=$(threshold_status "$REST_FILE" "http_req_failed")

          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## k6 Load Test Results — amplify-todo-app (UAT)

          **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Triggered by:** `${{ github.event_name }}`
          **Profile:** ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'load' }}

          ### GraphQL (AppSync)

          | Metric | Value | Threshold |
          |--------|-------|-----------|
          | p95 latency | $(format_ms "$GQL_P95") | $GQL_DUR_STATUS |
          | Error rate | $(format_rate "$GQL_ERR") | $GQL_ERR_STATUS |
          | Total requests | $GQL_REQ | — |

          ### REST (API Gateway)

          | Metric | Value | Threshold |
          |--------|-------|-----------|
          | p95 latency | $(format_ms "$REST_P95") | $REST_DUR_STATUS |
          | Error rate | $(format_rate "$REST_ERR") | $REST_ERR_STATUS |
          | Total requests | $REST_REQ | — |

          > Full JSON reports are attached as artifact **k6-results-${{ github.run_id }}**
          SUMMARY

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: Upload load test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ github.run_id }}
          path: reports/
          retention-days: 90

      # ── Upload to S3 ────────────────────────────────────────────────────────
      # Key prefix: load-tests/todo-app/uat/{YYYY-MM-DD}/{run_id}/
      # AWS credentials were already configured via OIDC above.
      - name: Upload reports to S3
        if: always()
        env:
          RESULTS_S3_BUCKET: ${{ secrets.RESULTS_S3_BUCKET }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          S3_PREFIX="amplify-todo-app/uat/${DATE}/${{ github.run_id }}"

          aws s3 cp reports/graphql-load.json \
            "s3://${RESULTS_S3_BUCKET}/${S3_PREFIX}/graphql-load.json"

          aws s3 cp reports/rest-load.json \
            "s3://${RESULTS_S3_BUCKET}/${S3_PREFIX}/rest-load.json"

          echo "Reports uploaded to s3://${RESULTS_S3_BUCKET}/${S3_PREFIX}/"